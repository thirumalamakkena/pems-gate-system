global:
  scrape_interval: 5s

scrape_configs:

  - job_name: "validation-consumer"
    static_configs:
      - targets:
          - validation-consumer:8001

  - job_name: "analytics-consumer"
    static_configs:
      - targets:
          - analytics-consumer:8002

  - job_name: "retry-consumer"
    static_configs:
      - targets:
          - retry-consumer:8003

  - job_name: "dlq-consumer"
    static_configs:
      - targets:
          - dlq-consumer:8004

  - job_name: "audit-consumer"
    static_configs:
      - targets:
          - audit-consumer:8005