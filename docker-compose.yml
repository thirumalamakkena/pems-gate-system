version: '3.8'

services:

  # ============================================
  # INFRASTRUCTURE
  # ============================================

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: pems-kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # Two listeners: PLAINTEXT (29092) is how other containers on this
      # network reach Kafka; PLAINTEXT_HOST (9092) is for host access
      # (e.g. a local Kafka UI tool). App services in this compose file
      # use kafka:29092.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka-data:/var/lib/kafka/data

  redis:
    image: redis:7
    container_name: pems-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./app/observability/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-data:/var/lib/grafana

  # ============================================
  # APPLICATION — gateway + 5 consumers, one
  # shared image (pinned via `image: pems-app:latest`
  # so Docker builds it once and reuses it), each
  # with its own command. MongoDB Atlas is cloud-hosted
  # so there's no local Mongo container here — MONGODB_URI
  # in .env points straight at Atlas.
  # ============================================

  gateway:
    build: .
    image: pems-app:latest
    container_name: pems-gateway
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - redis
    restart: unless-stopped

  validation-consumer:
    build: .
    image: pems-app:latest
    container_name: pems-validation-consumer
    command: python -m app.consumers.validation_consumer
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      - kafka
      - redis
    restart: unless-stopped

  analytics-consumer:
    build: .
    image: pems-app:latest
    container_name: pems-analytics-consumer
    command: python -m app.consumers.analytics_consumer
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      - kafka
    restart: unless-stopped

  retry-consumer:
    build: .
    image: pems-app:latest
    container_name: pems-retry-consumer
    command: python -m app.consumers.retry_consumer
    env_file: .env
    ports:
      - "8003:8003"
    depends_on:
      - kafka
    restart: unless-stopped

  dlq-consumer:
    build: .
    image: pems-app:latest
    container_name: pems-dlq-consumer
    command: python -m app.consumers.dlq_consumer
    env_file: .env
    ports:
      - "8004:8004"
    depends_on:
      - kafka
    restart: unless-stopped

  audit-consumer:
    build: .
    image: pems-app:latest
    container_name: pems-audit-consumer
    command: python -m app.consumers.audit_consumer
    env_file: .env
    ports:
      - "8005:8005"
    depends_on:
      - kafka
    restart: unless-stopped

  # ============================================
  # FRONTEND — static gate-scanner pages
  # ============================================

  frontend:
    image: nginx:alpine
    container_name: pems-frontend
    ports:
      - "5500:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  kafka-data:
  redis-data:
  grafana-data: