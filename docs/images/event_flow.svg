<svg width="900" height="1430" viewBox="0 0 900 1430" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#1E3A8A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#15803D" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#B91C1C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="1430" fill="#FFFFFF"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="92" fill="#1E3A8A"/>
  <text x="450" y="44" text-anchor="middle" font-size="25" font-weight="600" fill="#FFFFFF">QR Scan Event Flow</text>
  <text x="450" y="70" text-anchor="middle" font-size="13" fill="#BFDBFE">Lifecycle of a single scan through the event-driven pipeline</text>

  <!-- 1. Employee -->
  <g filter="url(#shadow)"><rect x="290" y="110" width="320" height="60" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/></g>
  <circle cx="322" cy="140" r="13" fill="#2563EB"/><circle cx="322" cy="135" r="4.5" fill="#EFF6FF"/>
  <path d="M315 145 q7 -7 14 0" stroke="#EFF6FF" stroke-width="2.2" fill="none"/>
  <text x="350" y="145" font-size="16" font-weight="600" fill="#1E3A8A">Employee</text>
  <line x1="450" y1="170" x2="450" y2="216" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 2. QR Scanner -->
  <g filter="url(#shadow)"><rect x="290" y="220" width="320" height="60" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/></g>
  <rect x="322" y="235" width="30" height="30" rx="3" fill="none" stroke="#2563EB" stroke-width="2"/>
  <path d="M322 243 h7 M322 235 v7 M352 235 v7 M345 235 h7 M322 257 h7 M322 265 v-7 M352 265 v-7 M345 265 h7" stroke="#2563EB" stroke-width="2" fill="none"/>
  <text x="365" y="255" font-size="16" font-weight="600" fill="#1E3A8A">QR scanner</text>
  <line x1="450" y1="280" x2="450" y2="326" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 3. Frontend -->
  <g filter="url(#shadow)"><rect x="290" y="330" width="320" height="60" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/></g>
  <rect x="322" y="345" width="30" height="22" rx="3" fill="none" stroke="#2563EB" stroke-width="2"/>
  <line x1="322" y1="352" x2="352" y2="352" stroke="#2563EB" stroke-width="1.5"/>
  <text x="365" y="365" font-size="16" font-weight="600" fill="#1E3A8A">Frontend</text>
  <line x1="450" y1="390" x2="450" y2="436" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 4. FastAPI Gateway -->
  <g filter="url(#shadow)"><rect x="290" y="440" width="320" height="60" rx="10" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.8"/></g>
  <polygon points="326,453 340,453 333,467 341,467 321,481 328,469 320,469" fill="#1E3A8A"/>
  <text x="365" y="475" font-size="16" font-weight="600" fill="#1E3A8A">FastAPI gateway</text>
  <line x1="450" y1="500" x2="450" y2="546" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="466" y="527" font-size="12" fill="#64748B">publishes event</text>

  <!-- 5. Kafka Topic: qr-scans -->
  <g filter="url(#shadow)"><rect x="290" y="550" width="320" height="60" rx="8" fill="#ECFDF5" stroke="#15803D" stroke-width="1.8" stroke-dasharray="7 4"/></g>
  <path d="M320 570 h11 M320 580 h11 M320 590 h11" stroke="#15803D" stroke-width="2.2"/>
  <text x="345" y="576" font-size="14" font-weight="600" fill="#166534">Kafka topic</text>
  <text x="345" y="594" font-size="14" fill="#15803D">qr-scans</text>
  <line x1="450" y1="610" x2="450" y2="656" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 6. Validation Consumer -->
  <g filter="url(#shadow)"><rect x="290" y="660" width="320" height="60" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/></g>
  <circle cx="332" cy="690" r="13" fill="none" stroke="#2563EB" stroke-width="2.2"/>
  <path d="M326 690 l4 4 l8 -8" fill="none" stroke="#2563EB" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="360" y="695" font-size="16" font-weight="600" fill="#1E3A8A">Validation consumer</text>
  <line x1="450" y1="720" x2="450" y2="766" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 7. MongoDB Validation -->
  <g filter="url(#shadow)"><rect x="290" y="770" width="320" height="60" rx="10" fill="#ECFDF5" stroke="#15803D" stroke-width="1.6"/></g>
  <ellipse cx="322" cy="792" rx="10" ry="5" fill="none" stroke="#15803D" stroke-width="2"/>
  <path d="M312 792 v10 a10 5 0 0 0 20 0 v-10" fill="none" stroke="#15803D" stroke-width="2"/>
  <text x="350" y="806" font-size="16" font-weight="600" fill="#166534">MongoDB validation</text>
  <line x1="450" y1="830" x2="450" y2="876" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="466" y="857" font-size="12" fill="#64748B">writes result</text>

  <!-- 8. Kafka Topic: validation-results -->
  <g filter="url(#shadow)"><rect x="290" y="880" width="320" height="60" rx="8" fill="#ECFDF5" stroke="#15803D" stroke-width="1.8" stroke-dasharray="7 4"/></g>
  <path d="M320 900 h11 M320 910 h11 M320 920 h11" stroke="#15803D" stroke-width="2.2"/>
  <text x="345" y="906" font-size="14" font-weight="600" fill="#166534">Kafka topic</text>
  <text x="345" y="924" font-size="14" fill="#15803D">validation-results</text>
  <line x1="450" y1="940" x2="450" y2="986" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 9. FastAPI Gateway (consumes result) -->
  <g filter="url(#shadow)"><rect x="290" y="990" width="320" height="60" rx="10" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.8"/></g>
  <polygon points="326,1003 340,1003 333,1017 341,1017 321,1031 328,1019 320,1019" fill="#1E3A8A"/>
  <text x="365" y="1025" font-size="16" font-weight="600" fill="#1E3A8A">FastAPI gateway</text>
  <line x1="450" y1="1050" x2="450" y2="1096" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="466" y="1077" font-size="12" fill="#64748B">pushes result</text>

  <!-- 10. WebSocket -->
  <g filter="url(#shadow)"><rect x="290" y="1100" width="320" height="60" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/></g>
  <path d="M320 1130 q7 -13 14 0 q7 13 14 0" stroke="#2563EB" stroke-width="2.2" fill="none"/>
  <text x="365" y="1135" font-size="16" font-weight="600" fill="#1E3A8A">WebSocket</text>
  <line x1="450" y1="1160" x2="450" y2="1206" stroke="#1E3A8A" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 11. Frontend (renders outcome) -->
  <g filter="url(#shadow)"><rect x="290" y="1210" width="320" height="60" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.6"/></g>
  <rect x="322" y="1225" width="30" height="22" rx="3" fill="none" stroke="#2563EB" stroke-width="2"/>
  <line x1="322" y1="1232" x2="352" y2="1232" stroke="#2563EB" stroke-width="1.5"/>
  <text x="365" y="1245" font-size="16" font-weight="600" fill="#1E3A8A">Frontend</text>
  <text x="365" y="1262" font-size="12" fill="#3B82F6">renders scan outcome</text>

  <!-- Branch to outcome -->
  <line x1="450" y1="1270" x2="290" y2="1318" stroke="#15803D" stroke-width="3" marker-end="url(#arrow-green)"/>
  <line x1="450" y1="1270" x2="610" y2="1318" stroke="#B91C1C" stroke-width="3" marker-end="url(#arrow-red)"/>

  <!-- ACCESS GRANTED -->
  <g filter="url(#shadow)"><rect x="160" y="1322" width="260" height="70" rx="10" fill="#DCFCE7" stroke="#15803D" stroke-width="2"/></g>
  <circle cx="196" cy="1357" r="14" fill="#15803D"/>
  <path d="M189 1357 l5 5 l10 -10" fill="none" stroke="#DCFCE7" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="222" y="1362" font-size="17" font-weight="700" fill="#14532D">ACCESS GRANTED</text>

  <!-- ACCESS DENIED -->
  <g filter="url(#shadow)"><rect x="480" y="1322" width="260" height="70" rx="10" fill="#FEE2E2" stroke="#B91C1C" stroke-width="2"/></g>
  <circle cx="516" cy="1357" r="14" fill="#B91C1C"/>
  <line x1="510" y1="1351" x2="522" y2="1363" stroke="#FEE2E2" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="522" y1="1351" x2="510" y2="1363" stroke="#FEE2E2" stroke-width="2.4" stroke-linecap="round"/>
  <text x="542" y="1362" font-size="17" font-weight="700" fill="#7F1D1D">ACCESS DENIED</text>

</svg>
