<svg width="980" height="760" viewBox="0 0 980 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a-gray" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1L10 6L1 11" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="a-green" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1L10 6L1 11" fill="none" stroke="#15803D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="a-orange" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1L10 6L1 11" fill="none" stroke="#C2410C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="a-red" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1L10 6L1 11" fill="none" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.12"/></filter>
  </defs>

  <rect x="0" y="0" width="980" height="760" fill="#FFFFFF"/>
  <rect x="0" y="0" width="980" height="90" fill="#1E3A8A"/>
  <text x="490" y="40" text-anchor="middle" font-size="24" font-weight="600" fill="#FFFFFF">Event Lifecycle</text>
  <text x="490" y="66" text-anchor="middle" font-size="13" fill="#BFDBFE">Journey of one QR_SCAN event through success, retry, and dead-letter paths</text>

  <!-- 1. QR_SCAN event -->
  <rect x="370" y="104" width="160" height="36" rx="18" fill="#E2E8F0" stroke="#475569" stroke-width="1.4"/>
  <text x="450" y="127" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="13" font-weight="700" fill="#334155">QR_SCAN</text>
  <line x1="450" y1="140" x2="450" y2="168" stroke="#334155" stroke-width="2.2" marker-end="url(#a-gray)"/>

  <!-- 2. Validation Consumer -->
  <g filter="url(#shadow)"><rect x="330" y="172" width="240" height="60" rx="10" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.6"/></g>
  <text x="450" y="207" text-anchor="middle" font-size="15" font-weight="600" fill="#0F766E">Validation Consumer</text>

  <!-- Branch: success (down) / failure (right) -->
  <line x1="450" y1="232" x2="450" y2="258" stroke="#15803D" stroke-width="2.4" marker-end="url(#a-green)"/>
  <text x="464" y="250" font-size="12.5" font-weight="600" fill="#15803D">success</text>

  <path d="M570 202 L760 202 L760 242" fill="none" stroke="#C2410C" stroke-width="2.4" marker-end="url(#a-orange)"/>
  <text x="600" y="194" font-size="12.5" font-weight="600" fill="#C2410C">failure</text>

  <!-- 3. VALIDATION_COMPLETED event -->
  <rect x="370" y="262" width="160" height="36" rx="18" fill="#DCFCE7" stroke="#15803D" stroke-width="1.4"/>
  <text x="450" y="285" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="12" font-weight="700" fill="#166534">VALIDATION_COMPLETED</text>
  <line x1="450" y1="298" x2="450" y2="326" stroke="#15803D" stroke-width="2.2" marker-end="url(#a-green)"/>

  <!-- 4. validation-results topic -->
  <g filter="url(#shadow)"><rect x="330" y="330" width="240" height="58" rx="8" fill="#F0FDF4" stroke="#15803D" stroke-width="1.8" stroke-dasharray="7 4"/></g>
  <path d="M352 348 h11 M352 358 h11 M352 368 h11" stroke="#15803D" stroke-width="2"/>
  <text x="378" y="354" font-size="13" font-weight="600" fill="#166534">Kafka topic</text>
  <text x="378" y="372" font-size="13" fill="#15803D">validation-results</text>
  <line x1="450" y1="388" x2="450" y2="416" stroke="#15803D" stroke-width="2.2" marker-end="url(#a-green)"/>

  <!-- 5. Gateway -->
  <g filter="url(#shadow)"><rect x="330" y="420" width="240" height="60" rx="10" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.6"/></g>
  <text x="450" y="455" text-anchor="middle" font-size="15" font-weight="600" fill="#1E3A8A">Gateway</text>
  <text x="450" y="472" text-anchor="middle" font-size="11" fill="#1D4ED8">delivers result via WebSocket</text>

  <!-- 3b. retry-validation topic -->
  <g filter="url(#shadow)"><rect x="640" y="246" width="240" height="58" rx="8" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.8" stroke-dasharray="7 4"/></g>
  <path d="M662 264 h11 M662 274 h11 M662 284 h11" stroke="#C2410C" stroke-width="2"/>
  <text x="688" y="270" font-size="13" font-weight="600" fill="#9A3412">Kafka topic</text>
  <text x="688" y="288" font-size="13" fill="#C2410C">retry-validation</text>
  <line x1="760" y1="304" x2="760" y2="332" stroke="#C2410C" stroke-width="2.2" marker-end="url(#a-orange)"/>

  <!-- 4b. Retry Consumer -->
  <g filter="url(#shadow)"><rect x="640" y="336" width="240" height="60" rx="10" fill="#FFEDD5" stroke="#C2410C" stroke-width="1.6"/></g>
  <text x="760" y="371" text-anchor="middle" font-size="15" font-weight="600" fill="#9A3412">Retry Consumer</text>

  <!-- Retry succeeds -> validation-results -->
  <path d="M640 362 L580 358" fill="none" stroke="#15803D" stroke-width="2.2" marker-end="url(#a-green)"/>
  <text x="576" y="410" text-anchor="end" font-size="12" font-weight="600" fill="#15803D">retry succeeds</text>

  <!-- Retry fails, loop back -->
  <path d="M880 358 L918 358 L918 275 L882 275" fill="none" stroke="#C2410C" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#a-orange)"/>
  <text x="928" y="320" font-size="12" font-weight="600" fill="#C2410C" transform="rotate(-90 928 320)">retry fails, attempt &lt; max</text>

  <!-- After max retries -->
  <line x1="760" y1="396" x2="760" y2="426" stroke="#B91C1C" stroke-width="2.4" marker-end="url(#a-red)"/>
  <text x="776" y="416" font-size="12.5" font-weight="600" fill="#B91C1C">after max retries</text>

  <!-- dead-letter-validation topic -->
  <g filter="url(#shadow)"><rect x="640" y="430" width="240" height="58" rx="8" fill="#FEF2F2" stroke="#B91C1C" stroke-width="1.8" stroke-dasharray="7 4"/></g>
  <path d="M662 448 h11 M662 458 h11 M662 468 h11" stroke="#B91C1C" stroke-width="2"/>
  <text x="688" y="454" font-size="13" font-weight="600" fill="#7F1D1D">Kafka topic</text>
  <text x="688" y="472" font-size="12" fill="#B91C1C">dead-letter-validation</text>
  <line x1="760" y1="488" x2="760" y2="516" stroke="#B91C1C" stroke-width="2.2" marker-end="url(#a-red)"/>

  <!-- DLQ Consumer -->
  <g filter="url(#shadow)"><rect x="640" y="520" width="240" height="60" rx="10" fill="#FEE2E2" stroke="#B91C1C" stroke-width="1.6"/></g>
  <text x="760" y="555" text-anchor="middle" font-size="15" font-weight="600" fill="#7F1D1D">DLQ Consumer</text>
  <line x1="760" y1="580" x2="760" y2="610" stroke="#B91C1C" stroke-width="2.2" marker-end="url(#a-red)"/>

  <!-- MongoDB dead_letter_events -->
  <g filter="url(#shadow)"><rect x="640" y="614" width="240" height="66" rx="10" fill="#FEE2E2" stroke="#B91C1C" stroke-width="1.6"/></g>
  <ellipse cx="666" cy="637" rx="9" ry="4.5" fill="none" stroke="#7F1D1D" stroke-width="1.6"/>
  <path d="M657 637 v8 a9 4.5 0 0 0 18 0 v-8" fill="none" stroke="#7F1D1D" stroke-width="1.6"/>
  <text x="760" y="642" text-anchor="middle" font-size="14" font-weight="700" fill="#7F1D1D">MongoDB</text>
  <text x="760" y="660" text-anchor="middle" font-size="12" fill="#B91C1C">dead_letter_events</text>

  <!-- Legend -->
  <g transform="translate(60, 720)">
    <line x1="0" y1="-4" x2="30" y2="-4" stroke="#15803D" stroke-width="2.4"/>
    <text x="38" y="0" font-size="12.5" fill="#334155">Success</text>
    <line x1="150" y1="-4" x2="180" y2="-4" stroke="#C2410C" stroke-width="2.4"/>
    <text x="188" y="0" font-size="12.5" fill="#334155">Retry</text>
    <line x1="280" y1="-4" x2="310" y2="-4" stroke="#B91C1C" stroke-width="2.4"/>
    <text x="318" y="0" font-size="12.5" fill="#334155">Dead letter</text>
  </g>
</svg>
