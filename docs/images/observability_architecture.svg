<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L10 6L1 11" fill="none" stroke="#334155" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="800" y="48" text-anchor="middle" font-size="26" font-weight="700" fill="#0F172A">Observability Architecture</text>
  <line x1="600" y1="66" x2="1000" y2="66" stroke="#CBD5E1" stroke-width="1.2"/>

  <!-- ============ Grafana ============ -->
  <g filter="url(#shadow)"><rect x="670" y="90" width="260" height="64" rx="10" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.6"/></g>
  <text x="800" y="116" text-anchor="middle" font-size="15" font-weight="700" fill="#1E3A8A">Grafana</text>
  <text x="800" y="134" text-anchor="middle" font-size="11.5" fill="#1D4ED8">Dashboards &amp; metrics</text>

  <line x1="800" y1="220" x2="800" y2="156" stroke="#334155" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="816" y="192" font-size="11.5" font-style="italic" fill="#64748B">PromQL queries</text>

  <!-- ============ Prometheus ============ -->
  <g filter="url(#shadow)"><rect x="670" y="222" width="260" height="64" rx="10" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.6"/></g>
  <text x="800" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#1E3A8A">Prometheus</text>
  <text x="800" y="266" text-anchor="middle" font-size="11.5" fill="#1D4ED8">Time-series database</text>

  <line x1="1600" y1="316" x2="0" y2="316" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 5"/>
  <text x="800" y="335" text-anchor="middle" font-size="11.5" font-style="italic" fill="#64748B">scrapes /metrics endpoints from each service</text>

  <!-- ============ 5 Application Services (green) ============ -->
  <!-- centers: 190,495,800,1105,1410  box: w260 h70 y=380 -->
  <g filter="url(#shadow)"><rect x="60" y="380" width="260" height="70" rx="10" fill="#DCFCE7" stroke="#15803D" stroke-width="1.6"/></g>
  <text x="190" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Validation Consumer</text>
  <text x="190" y="430" text-anchor="middle" font-size="11.5" fill="#15803D">Port : 8001</text>

  <g filter="url(#shadow)"><rect x="365" y="380" width="260" height="70" rx="10" fill="#DCFCE7" stroke="#15803D" stroke-width="1.6"/></g>
  <text x="495" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Analytics Consumer</text>
  <text x="495" y="430" text-anchor="middle" font-size="11.5" fill="#15803D">Port : 8002</text>

  <g filter="url(#shadow)"><rect x="670" y="380" width="260" height="70" rx="10" fill="#DCFCE7" stroke="#15803D" stroke-width="1.6"/></g>
  <text x="800" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Retry Consumer</text>
  <text x="800" y="430" text-anchor="middle" font-size="11.5" fill="#15803D">Port : 8003</text>

  <g filter="url(#shadow)"><rect x="975" y="380" width="260" height="70" rx="10" fill="#DCFCE7" stroke="#15803D" stroke-width="1.6"/></g>
  <text x="1105" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">DLQ Consumer</text>
  <text x="1105" y="430" text-anchor="middle" font-size="11.5" fill="#15803D">Port : 8004</text>

  <g filter="url(#shadow)"><rect x="1280" y="380" width="260" height="70" rx="10" fill="#DCFCE7" stroke="#15803D" stroke-width="1.6"/></g>
  <text x="1410" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">Audit Consumer</text>
  <text x="1410" y="430" text-anchor="middle" font-size="11.5" fill="#15803D">Port : 8005</text>

  <!-- consumers -> Prometheus (fan-in) -->
  <line x1="190" y1="380" x2="770" y2="288" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="495" y1="380" x2="785" y2="288" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="800" y1="380" x2="800" y2="288" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1105" y1="380" x2="815" y2="288" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1410" y1="380" x2="830" y2="288" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- prometheus_metrics.py -> consumers (fan-out) -->
  <line x1="770" y1="562" x2="190" y2="452" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="785" y1="562" x2="495" y2="452" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="800" y1="562" x2="800" y2="452" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="815" y1="562" x2="1105" y2="452" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="830" y1="562" x2="1410" y2="452" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="1040" y="510" font-size="11.5" font-style="italic" fill="#64748B">client API imported by each consumer</text>

  <!-- ============ prometheus_metrics.py (orange) ============ -->
  <g filter="url(#shadow)"><rect x="630" y="562" width="340" height="64" rx="10" fill="#FFEDD5" stroke="#C2410C" stroke-width="1.6"/></g>
  <text x="800" y="588" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="14.5" font-weight="700" fill="#9A3412">prometheus_metrics.py</text>
  <text x="800" y="606" text-anchor="middle" font-size="11.5" fill="#C2410C">Prometheus client API</text>

  <line x1="1600" y1="670" x2="0" y2="670" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4 5"/>

  <!-- ============ 5 Metrics Categories (gray) ============ -->
  <!-- category boxes -> prometheus_metrics.py (fan-in) -->
  <line x1="190" y1="700" x2="760" y2="596" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="495" y1="700" x2="780" y2="596" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="800" y1="700" x2="800" y2="596" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1105" y1="700" x2="820" y2="596" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="1410" y1="700" x2="840" y2="596" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Counters -->
  <g filter="url(#shadow)"><rect x="60" y="700" width="260" height="150" rx="10" fill="#F1F5F9" stroke="#475569" stroke-width="1.6"/></g>
  <text x="190" y="724" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Counters</text>
  <g font-size="11.5" fill="#475569">
    <text x="80" y="746">&#8226; Events Processed</text>
    <text x="80" y="764">&#8226; Events Failed</text>
    <text x="80" y="782">&#8226; Cache Hits</text>
    <text x="80" y="800">&#8226; Cache Misses</text>
    <text x="80" y="818">&#8226; Retry Events</text>
    <text x="80" y="836">&#8226; DLQ Events</text>
  </g>

  <!-- Histograms -->
  <g filter="url(#shadow)"><rect x="365" y="700" width="260" height="150" rx="10" fill="#F1F5F9" stroke="#475569" stroke-width="1.6"/></g>
  <text x="495" y="724" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Histograms</text>
  <g font-size="11.5" fill="#475569">
    <text x="385" y="746">&#8226; Event Processing</text>
    <text x="393" y="762">Latency</text>
  </g>

  <!-- Gauges -->
  <g filter="url(#shadow)"><rect x="670" y="700" width="260" height="150" rx="10" fill="#F1F5F9" stroke="#475569" stroke-width="1.6"/></g>
  <text x="800" y="724" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Gauges</text>
  <g font-size="11.5" fill="#475569">
    <text x="690" y="746">&#8226; Active Consumers</text>
  </g>

  <!-- Kafka Metrics -->
  <g filter="url(#shadow)"><rect x="975" y="700" width="260" height="150" rx="10" fill="#F1F5F9" stroke="#475569" stroke-width="1.6"/></g>
  <text x="1105" y="724" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Kafka Metrics</text>
  <g font-size="11.5" fill="#475569">
    <text x="995" y="746">&#8226; Messages Produced</text>
    <text x="995" y="764">&#8226; Messages Consumed</text>
  </g>

  <!-- Validation Metrics -->
  <g filter="url(#shadow)"><rect x="1280" y="700" width="260" height="150" rx="10" fill="#F1F5F9" stroke="#475569" stroke-width="1.6"/></g>
  <text x="1410" y="724" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Validation Metrics</text>
  <g font-size="11.5" fill="#475569">
    <text x="1300" y="746">&#8226; VALID Results</text>
    <text x="1300" y="764">&#8226; INVALID Results</text>
  </g>

  <!-- ============ Legend ============ -->
  <g transform="translate(1210, 870)">
    <rect x="0" y="0" width="330" height="118" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.2"/>
    <rect x="14" y="14" width="14" height="14" rx="3" fill="#DBEAFE" stroke="#1E3A8A"/>
    <text x="36" y="25" font-size="11.5" fill="#334155">Blue = Monitoring Components</text>
    <rect x="14" y="38" width="14" height="14" rx="3" fill="#DCFCE7" stroke="#15803D"/>
    <text x="36" y="49" font-size="11.5" fill="#334155">Green = Application Services</text>
    <rect x="14" y="62" width="14" height="14" rx="3" fill="#FFEDD5" stroke="#C2410C"/>
    <text x="36" y="73" font-size="11.5" fill="#334155">Orange = Metrics Collection</text>
    <rect x="14" y="86" width="14" height="14" rx="3" fill="#F1F5F9" stroke="#475569"/>
    <text x="36" y="97" font-size="11.5" fill="#334155">Gray = Metrics Categories</text>
  </g>

</svg>
