<svg width="1000" height="880" viewBox="0 0 1000 880" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a-gray" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1L10 6L1 11" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="a-green" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1L10 6L1 11" fill="none" stroke="#15803D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="a-orange" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1L10 6L1 11" fill="none" stroke="#C2410C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="a-red" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M1 1L10 6L1 11" fill="none" stroke="#B91C1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.12"/></filter>
  </defs>

  <rect x="0" y="0" width="1000" height="880" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1000" height="90" fill="#1E3A8A"/>
  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="600" fill="#FFFFFF">Retry &amp; DLQ Flow</text>
  <text x="500" y="66" text-anchor="middle" font-size="13" fill="#BFDBFE">Failure handling for the validation pipeline</text>

  <!-- 1. Validation Consumer -->
  <g filter="url(#shadow)"><rect x="340" y="110" width="220" height="60" rx="10" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.6"/></g>
  <text x="450" y="145" text-anchor="middle" font-size="15" font-weight="600" fill="#0F766E">Validation Consumer</text>
  <line x1="450" y1="170" x2="450" y2="206" stroke="#334155" stroke-width="2.2" marker-end="url(#a-gray)"/>

  <!-- 2. Exception -->
  <g filter="url(#shadow)"><rect x="360" y="210" width="180" height="50" rx="10" fill="#FEF2F2" stroke="#B91C1C" stroke-width="1.6"/></g>
  <polygon points="382,244 392,226 402,244" fill="none" stroke="#B91C1C" stroke-width="1.8" stroke-linejoin="round"/>
  <line x1="392" y1="233" x2="392" y2="238" stroke="#B91C1C" stroke-width="1.8"/>
  <circle cx="392" cy="241.5" r="0.9" fill="#B91C1C"/>
  <text x="412" y="240" font-size="14" font-weight="600" fill="#7F1D1D">Exception</text>
  <line x1="450" y1="260" x2="450" y2="296" stroke="#334155" stroke-width="2.2" marker-end="url(#a-gray)"/>

  <!-- 3. Decision diamond -->
  <polygon points="450,300 590,362 450,424 310,362" fill="#FFF7ED" stroke="#B45309" stroke-width="1.8"/>
  <text x="450" y="357" text-anchor="middle" font-size="13.5" font-weight="600" fill="#92400E">retryCount</text>
  <text x="450" y="374" text-anchor="middle" font-size="13.5" font-weight="600" fill="#92400E">&lt; MAX ?</text>

  <!-- Yes branch (down) -->
  <line x1="450" y1="424" x2="450" y2="462" stroke="#15803D" stroke-width="2.2" marker-end="url(#a-green)"/>
  <text x="466" y="448" font-size="13" font-weight="600" fill="#15803D">yes</text>

  <!-- No branch (right, after max retries) -->
  <line x1="590" y1="362" x2="750" y2="362" stroke="#B91C1C" stroke-width="2.2" marker-end="url(#a-red)"/>
  <line x1="750" y1="362" x2="750" y2="466" stroke="#B91C1C" stroke-width="2.2" marker-end="url(#a-red)"/>
  <text x="655" y="352" text-anchor="middle" font-size="12.5" font-weight="600" fill="#B91C1C">no &#8212; after max retries</text>

  <!-- 4. retry-validation topic (blue cylinder) -->
  <ellipse cx="450" cy="570" rx="70" ry="14" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.6"/>
  <rect x="380" y="470" width="140" height="100" fill="#DBEAFE"/>
  <line x1="380" y1="470" x2="380" y2="570" stroke="#1D4ED8" stroke-width="1.6"/>
  <line x1="520" y1="470" x2="520" y2="570" stroke="#1D4ED8" stroke-width="1.6"/>
  <ellipse cx="450" cy="470" rx="70" ry="14" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.6"/>
  <text x="450" y="516" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1E3A8A">Kafka topic</text>
  <text x="450" y="534" text-anchor="middle" font-size="12.5" fill="#1D4ED8">retry-validation</text>
  <line x1="450" y1="584" x2="450" y2="618" stroke="#334155" stroke-width="2.2" marker-end="url(#a-gray)"/>
  <text x="466" y="605" font-size="12" fill="#64748B" font-style="italic">consumes</text>

  <!-- 5. Retry Consumer -->
  <g filter="url(#shadow)"><rect x="340" y="622" width="220" height="60" rx="10" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.6"/></g>
  <text x="450" y="657" text-anchor="middle" font-size="15" font-weight="600" fill="#0F766E">Retry Consumer</text>

  <!-- Success branch -->
  <path d="M400 682 L400 712 L250 712 L250 748" fill="none" stroke="#15803D" stroke-width="2.2" marker-end="url(#a-green)"/>
  <text x="270" y="704" font-size="13" font-weight="600" fill="#15803D">success</text>

  <!-- Failure branch: loop back to retry-validation (increments retryCount) -->
  <path d="M560 650 L630 650 L630 500 L521 500" fill="none" stroke="#C2410C" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#a-orange)"/>
  <text x="638" y="580" font-size="12.5" font-weight="600" fill="#C2410C" transform="rotate(-90 638 580)">failure</text>
  <text x="560" y="490" font-size="11.5" font-style="italic" fill="#C2410C">increments retryCount, republishes</text>

  <!-- 6. validation-results topic (blue cylinder) -->
  <ellipse cx="250" cy="830" rx="70" ry="14" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.6"/>
  <rect x="180" y="750" width="140" height="80" fill="#DBEAFE"/>
  <line x1="180" y1="750" x2="180" y2="830" stroke="#1D4ED8" stroke-width="1.6"/>
  <line x1="320" y1="750" x2="320" y2="830" stroke="#1D4ED8" stroke-width="1.6"/>
  <ellipse cx="250" cy="750" rx="70" ry="14" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.6"/>
  <text x="250" y="792" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1E3A8A">Kafka topic</text>
  <text x="250" y="810" text-anchor="middle" font-size="12" fill="#1D4ED8">validation-results</text>

  <!-- 7. dead-letter-validation topic (blue cylinder) -->
  <ellipse cx="750" cy="570" rx="70" ry="14" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.6"/>
  <rect x="680" y="470" width="140" height="100" fill="#DBEAFE"/>
  <line x1="680" y1="470" x2="680" y2="570" stroke="#1D4ED8" stroke-width="1.6"/>
  <line x1="820" y1="470" x2="820" y2="570" stroke="#1D4ED8" stroke-width="1.6"/>
  <ellipse cx="750" cy="470" rx="70" ry="14" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.6"/>
  <text x="750" y="512" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1E3A8A">Kafka topic</text>
  <text x="750" y="530" text-anchor="middle" font-size="11.5" fill="#1D4ED8">dead-letter-validation</text>
  <line x1="750" y1="584" x2="750" y2="618" stroke="#334155" stroke-width="2.2" marker-end="url(#a-gray)"/>

  <!-- 8. DLQ Consumer -->
  <g filter="url(#shadow)"><rect x="640" y="622" width="220" height="60" rx="10" fill="#FEE2E2" stroke="#B91C1C" stroke-width="1.6"/></g>
  <text x="750" y="657" text-anchor="middle" font-size="15" font-weight="600" fill="#7F1D1D">DLQ Consumer</text>
  <line x1="750" y1="682" x2="750" y2="748" stroke="#334155" stroke-width="2.2" marker-end="url(#a-gray)"/>

  <!-- 9. MongoDB dead_letter_events (green cylinder) -->
  <ellipse cx="750" cy="830" rx="70" ry="14" fill="#DCFCE7" stroke="#15803D" stroke-width="1.6"/>
  <rect x="680" y="750" width="140" height="80" fill="#DCFCE7"/>
  <line x1="680" y1="750" x2="680" y2="830" stroke="#15803D" stroke-width="1.6"/>
  <line x1="820" y1="750" x2="820" y2="830" stroke="#15803D" stroke-width="1.6"/>
  <ellipse cx="750" cy="750" rx="70" ry="14" fill="#DCFCE7" stroke="#15803D" stroke-width="1.6"/>
  <text x="750" y="792" text-anchor="middle" font-size="12.5" font-weight="600" fill="#166534">MongoDB</text>
  <text x="750" y="810" text-anchor="middle" font-size="12" fill="#15803D">dead_letter_events</text>

  <!-- Legend -->
  <g transform="translate(60, 862)">
    <line x1="0" y1="-4" x2="30" y2="-4" stroke="#15803D" stroke-width="2.2"/>
    <text x="38" y="0" font-size="12.5" fill="#334155">Success path</text>
    <line x1="170" y1="-4" x2="200" y2="-4" stroke="#C2410C" stroke-width="2.2" stroke-dasharray="6 4"/>
    <text x="208" y="0" font-size="12.5" fill="#334155">Retry loop (failure)</text>
    <line x1="380" y1="-4" x2="410" y2="-4" stroke="#B91C1C" stroke-width="2.2"/>
    <text x="418" y="0" font-size="12.5" fill="#334155">Dead-letter path (max retries exceeded)</text>
  </g>
</svg>
