<svg width="1150" height="700" viewBox="0 0 1150 700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a-blue" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1L10 6L1 11" fill="none" stroke="#2563EB" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0F172A" flood-opacity="0.13"/></filter>
  </defs>

  <rect x="0" y="0" width="1150" height="700" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1150" height="88" fill="#1E3A8A"/>
  <text x="575" y="38" text-anchor="middle" font-size="23" font-weight="600" fill="#FFFFFF">Redis Distributed Cache Architecture</text>
  <text x="575" y="63" text-anchor="middle" font-size="13" fill="#BFDBFE">How the Validation Service uses Redis as a shared cache-aside layer</text>

  <!-- ============ Consumers (orange) ============ -->
  <g filter="url(#shadow)"><rect x="40" y="160" width="220" height="70" rx="10" fill="#FFEDD5" stroke="#C2410C" stroke-width="1.6"/></g>
  <text x="150" y="200" text-anchor="middle" font-size="15" font-weight="600" fill="#9A3412">Validation Consumer</text>

  <g filter="url(#shadow)"><rect x="40" y="380" width="220" height="70" rx="10" fill="#FFEDD5" stroke="#C2410C" stroke-width="1.6"/></g>
  <text x="150" y="420" text-anchor="middle" font-size="15" font-weight="600" fill="#9A3412">Retry Consumer</text>

  <!-- Validation Request -->
  <line x1="260" y1="195" x2="378" y2="278" stroke="#2563EB" stroke-width="2" marker-end="url(#a-blue)"/>
  <line x1="260" y1="415" x2="378" y2="362" stroke="#2563EB" stroke-width="2" marker-end="url(#a-blue)"/>
  <text x="290" y="245" font-size="11.5" fill="#1D4ED8">&#9312; Validation Request</text>

  <!-- Validation Result (return, dashed) -->
  <path d="M378 300 L260 210" fill="none" stroke="#2563EB" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#a-blue)"/>
  <path d="M378 340 L260 400" fill="none" stroke="#2563EB" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#a-blue)"/>
  <text x="278" y="330" font-size="11.5" fill="#1D4ED8">&#9318; Validation Result</text>

  <!-- ============ Validation Service (purple) ============ -->
  <g filter="url(#shadow)"><rect x="380" y="250" width="260" height="140" rx="12" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1.8"/></g>
  <text x="510" y="290" text-anchor="middle" font-size="16" font-weight="700" fill="#5B21B6">Validation Service</text>
  <text x="510" y="308" text-anchor="middle" font-size="11.5" fill="#6D28D9">shared business logic</text>
  <text x="510" y="324" text-anchor="middle" font-size="11" font-style="italic" fill="#7C3AED">Cache-Aside Pattern</text>
  <text x="510" y="344" text-anchor="middle" font-size="10.5" fill="#7C3AED">sole owner of cache access</text>
  <text x="510" y="360" text-anchor="middle" font-size="10.5" fill="#7C3AED">Redis is an internal detail &#8212;</text>
  <text x="510" y="374" text-anchor="middle" font-size="10.5" fill="#7C3AED">consumers never touch it directly</text>

  <!-- ============ Redis <-> Service arrow bundle ============ -->
  <line x1="640" y1="258" x2="758" y2="258" stroke="#2563EB" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <text x="770" y="262" font-size="11" fill="#1D4ED8">&#9313; Cache Lookup</text>

  <line x1="758" y1="276" x2="640" y2="276" stroke="#2563EB" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <text x="770" y="280" font-size="11" fill="#1D4ED8">&#9314; Cache Hit &#8594; return immediately</text>

  <line x1="758" y1="294" x2="640" y2="294" stroke="#2563EB" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <text x="770" y="298" font-size="11" fill="#1D4ED8">&#9315; Cache Miss</text>

  <line x1="640" y1="312" x2="758" y2="312" stroke="#2563EB" stroke-width="1.8" marker-end="url(#a-blue)"/>
  <text x="770" y="316" font-size="11" fill="#1D4ED8">&#9317; Cache Update (write, with TTL)</text>

  <!-- MongoDB Read -->
  <line x1="640" y1="360" x2="758" y2="430" stroke="#2563EB" stroke-width="2" marker-end="url(#a-blue)"/>
  <text x="655" y="405" font-size="11.5" fill="#1D4ED8">&#9316; MongoDB Read (on cache miss)</text>

  <!-- ============ Redis Distributed Cache (green) ============ -->
  <g filter="url(#shadow)"><rect x="760" y="140" width="320" height="180" rx="12" fill="#DCFCE7" stroke="#15803D" stroke-width="1.8"/></g>
  <text x="920" y="164" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Redis Distributed Cache</text>

  <rect x="778" y="178" width="130" height="50" rx="8" fill="#FFFFFF" stroke="#15803D" stroke-width="1.3"/>
  <text x="843" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">User Cache</text>
  <text x="843" y="215" text-anchor="middle" font-size="10.5" fill="#15803D">TTL: 30 min</text>

  <rect x="922" y="178" width="130" height="50" rx="8" fill="#FFFFFF" stroke="#15803D" stroke-width="1.3"/>
  <text x="987" y="198" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Gateway Cache</text>
  <text x="987" y="215" text-anchor="middle" font-size="10.5" fill="#15803D">TTL: 60 min</text>

  <text x="920" y="252" text-anchor="middle" font-size="10.5" font-style="italic" fill="#166534">Shared across all consumer instances</text>

  <!-- ============ MongoDB Atlas (dark green) ============ -->
  <g filter="url(#shadow)"><rect x="760" y="380" width="320" height="140" rx="12" fill="#BBF7D0" stroke="#14532D" stroke-width="1.8"/></g>
  <text x="920" y="404" text-anchor="middle" font-size="15" font-weight="700" fill="#14532D">MongoDB Atlas</text>

  <rect x="780" y="430" width="140" height="40" rx="8" fill="#FFFFFF" stroke="#14532D" stroke-width="1.3"/>
  <text x="850" y="455" text-anchor="middle" font-size="12.5" fill="#14532D">users</text>

  <rect x="940" y="430" width="140" height="40" rx="8" fill="#FFFFFF" stroke="#14532D" stroke-width="1.3"/>
  <text x="1010" y="455" text-anchor="middle" font-size="12.5" fill="#14532D">pems_gateways</text>

  <!-- ============ Annotation ============ -->
  <rect x="40" y="560" width="1070" height="90" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.2"/>
  <text x="60" y="586" font-size="12.5" font-weight="600" fill="#334155">Cache-Aside Pattern</text>
  <text x="60" y="606" font-size="12" fill="#475569">Validation Service checks Redis first, falls back to MongoDB on cache miss, updates the cache, and returns the</text>
  <text x="60" y="624" font-size="12" fill="#475569">validation result. This reduces database load while enabling multiple consumer instances to share the same</text>
  <text x="60" y="642" font-size="12" fill="#475569">distributed cache.</text>

</svg>
