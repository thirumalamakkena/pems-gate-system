<svg width="1200" height="1560" viewBox="0 0 1200 1560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#334155" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1L8 5L1 9" fill="none" stroke="#C2410C" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#1E293B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="1560" fill="#FFFFFF"/>

  <!-- Header banner -->
  <rect x="0" y="0" width="1200" height="96" fill="#1E3A8A"/>
  <text x="600" y="46" text-anchor="middle" font-size="26" font-weight="600" fill="#FFFFFF">PEMS Analytics &amp; Monitoring Platform Architecture</text>
  <text x="600" y="74" text-anchor="middle" font-size="14" fill="#BFDBFE">Real-time QR validation &#183; Kafka event streaming &#183; MongoDB persistence</text>

  <!-- ============ MAIN CHAIN ============ -->
  <!-- 1. Employee -->
  <g filter="url(#shadow)">
    <rect x="460" y="140" width="280" height="64" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  </g>
  <circle cx="500" cy="172" r="14" fill="#2563EB"/>
  <circle cx="500" cy="167" r="5" fill="#EFF6FF"/>
  <path d="M492 178 q8 -8 16 0" stroke="#EFF6FF" stroke-width="2.5" fill="none"/>
  <text x="530" y="177" font-size="15" font-weight="600" fill="#1E3A8A">Employee</text>
  <line x1="600" y1="204" x2="600" y2="254" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 2. QR Code Badge -->
  <g filter="url(#shadow)">
    <rect x="460" y="254" width="280" height="64" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  </g>
  <rect x="486" y="270" width="32" height="32" rx="2" fill="none" stroke="#2563EB" stroke-width="2"/>
  <rect x="492" y="276" width="6" height="6" fill="#2563EB"/>
  <rect x="506" y="276" width="6" height="6" fill="#2563EB"/>
  <rect x="492" y="290" width="6" height="6" fill="#2563EB"/>
  <rect x="506" y="290" width="6" height="6" fill="#2563EB"/>
  <text x="530" y="291" font-size="15" font-weight="600" fill="#1E3A8A">QR code badge</text>
  <line x1="600" y1="318" x2="600" y2="368" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 3. QR Scanner -->
  <g filter="url(#shadow)">
    <rect x="460" y="368" width="280" height="64" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  </g>
  <rect x="486" y="384" width="32" height="32" rx="4" fill="none" stroke="#2563EB" stroke-width="2"/>
  <path d="M486 392 h8 M486 384 v8 M518 384 v8 M510 384 h8 M486 408 h8 M486 416 v-8 M518 416 v-8 M510 416 h8" stroke="#2563EB" stroke-width="2" fill="none"/>
  <text x="530" y="384" font-size="15" font-weight="600" fill="#1E3A8A">QR scanner</text>
  <text x="530" y="402" font-size="12" fill="#3B82F6">html5-qrcode library</text>
  <line x1="600" y1="432" x2="600" y2="482" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 4. Frontend -->
  <g filter="url(#shadow)">
    <rect x="460" y="482" width="280" height="64" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  </g>
  <rect x="486" y="498" width="32" height="24" rx="3" fill="none" stroke="#2563EB" stroke-width="2"/>
  <line x1="486" y1="506" x2="518" y2="506" stroke="#2563EB" stroke-width="1.5"/>
  <text x="530" y="498" font-size="15" font-weight="600" fill="#1E3A8A">Frontend</text>
  <text x="530" y="516" font-size="12" fill="#3B82F6">HTML &#183; CSS &#183; JavaScript</text>
  <text x="825" y="640" font-size="12" fill="#C2410C" font-style="italic">async response</text>
  <line x1="600" y1="546" x2="600" y2="596" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="614" y="575" font-size="12" fill="#64748B">connects via</text>

  <!-- 5. WebSocket -->
  <g filter="url(#shadow)">
    <rect x="460" y="596" width="280" height="64" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  </g>
  <path d="M486 628 q8 -14 16 0 q8 14 16 0" stroke="#2563EB" stroke-width="2" fill="none"/>
  <text x="530" y="633" font-size="15" font-weight="600" fill="#1E3A8A">WebSocket</text>
  <line x1="600" y1="660" x2="600" y2="710" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 6. FastAPI Gateway -->
  <g filter="url(#shadow)">
    <rect x="460" y="710" width="280" height="64" rx="10" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
  </g>
  <polygon points="494,726 510,726 502,742 512,742 490,758 498,744 488,744" fill="#1E3A8A"/>
  <text x="530" y="738" font-size="15" font-weight="600" fill="#1E3A8A">FastAPI gateway</text>
  <text x="530" y="756" font-size="12" fill="#1D4ED8">Python service layer</text>
  <line x1="600" y1="774" x2="600" y2="824" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 7. Kafka Producer -->
  <g filter="url(#shadow)">
    <rect x="460" y="824" width="280" height="64" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
  </g>
  <circle cx="502" cy="856" r="4" fill="#2563EB"/>
  <circle cx="514" cy="850" r="4" fill="#2563EB"/>
  <circle cx="514" cy="862" r="4" fill="#2563EB"/>
  <line x1="502" y1="856" x2="514" y2="850" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="502" y1="856" x2="514" y2="862" stroke="#2563EB" stroke-width="1.5"/>
  <text x="530" y="861" font-size="15" font-weight="600" fill="#1E3A8A">Kafka producer</text>
  <line x1="600" y1="888" x2="600" y2="938" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 8. Kafka Topic: qr-scans -->
  <g filter="url(#shadow)">
    <rect x="460" y="938" width="280" height="64" rx="8" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.5" stroke-dasharray="6 3"/>
  </g>
  <path d="M482 962 h10 M482 970 h10 M482 978 h10" stroke="#C2410C" stroke-width="2"/>
  <text x="530" y="965" font-size="14" font-weight="600" fill="#9A3412">Kafka topic</text>
  <text x="530" y="983" font-size="13" fill="#C2410C">qr-scans</text>

  <!-- Fan-out to 3 consumers -->
  <line x1="600" y1="1002" x2="310" y2="1082" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="600" y1="1002" x2="600" y2="1082" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="600" y1="1002" x2="890" y2="1082" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Validation-results topic (right side) -->
  <g filter="url(#shadow)">
    <rect x="850" y="938" width="300" height="64" rx="8" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.5" stroke-dasharray="6 3"/>
  </g>
  <path d="M872 962 h10 M872 970 h10 M872 978 h10" stroke="#C2410C" stroke-width="2"/>
  <text x="920" y="965" font-size="14" font-weight="600" fill="#9A3412">Kafka topic</text>
  <text x="920" y="983" font-size="13" fill="#C2410C">validation-results</text>

  <!-- ============ CONSUMER TIER ============ -->
  <g filter="url(#shadow)">
    <rect x="210" y="1082" width="200" height="64" rx="10" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5"/>
  </g>
  <text x="310" y="1108" text-anchor="middle" font-size="14" font-weight="600" fill="#0F766E">Validation</text>
  <text x="310" y="1126" text-anchor="middle" font-size="14" font-weight="600" fill="#0F766E">consumer</text>

  <g filter="url(#shadow)">
    <rect x="500" y="1082" width="200" height="64" rx="10" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5"/>
  </g>
  <text x="600" y="1108" text-anchor="middle" font-size="14" font-weight="600" fill="#0F766E">Analytics</text>
  <text x="600" y="1126" text-anchor="middle" font-size="14" font-weight="600" fill="#0F766E">consumer</text>

  <g filter="url(#shadow)">
    <rect x="790" y="1082" width="200" height="64" rx="10" fill="#CCFBF1" stroke="#0F766E" stroke-width="1.5"/>
  </g>
  <text x="890" y="1108" text-anchor="middle" font-size="14" font-weight="600" fill="#0F766E">Audit</text>
  <text x="890" y="1126" text-anchor="middle" font-size="14" font-weight="600" fill="#0F766E">consumer</text>

  <!-- Validation Consumer -> validation-results topic -->
  <path d="M410 1090 L820 970" stroke="#C2410C" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>
  <text x="560" y="1010" font-size="12" fill="#C2410C" font-style="italic">publishes result</text>

  <!-- Response loop: validation-results -> FastAPI -> WebSocket -> Frontend -->
  <path d="M1000 938 C 1010 850, 900 780, 750 742" stroke="#C2410C" stroke-width="1.6" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>
  <line x1="780" y1="710" x2="780" y2="660" stroke="#C2410C" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>
  <line x1="780" y1="596" x2="780" y2="546" stroke="#C2410C" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>

  <!-- Arrows: consumers down to their store groups -->
  <line x1="310" y1="1146" x2="310" y2="1196" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="600" y1="1146" x2="600" y2="1196" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="890" y1="1146" x2="890" y2="1196" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ============ DATA TIER: MongoDB collections ============ -->
  <!-- Validation store group -->
  <rect x="170" y="1196" width="280" height="164" rx="12" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="310" y="1218" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">MongoDB collections</text>

  <g filter="url(#shadow)"><rect x="190" y="1230" width="240" height="32" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.2"/></g>
  <ellipse cx="206" cy="1246" rx="8" ry="4" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <path d="M198 1246 v6 a8 4 0 0 0 16 0 v-6" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <text x="222" y="1250" font-size="13" fill="#166534">users</text>

  <g filter="url(#shadow)"><rect x="190" y="1270" width="240" height="32" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.2"/></g>
  <ellipse cx="206" cy="1286" rx="8" ry="4" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <path d="M198 1286 v6 a8 4 0 0 0 16 0 v-6" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <text x="222" y="1290" font-size="13" fill="#166534">pems_gateways</text>

  <g filter="url(#shadow)"><rect x="190" y="1310" width="240" height="32" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.2"/></g>
  <ellipse cx="206" cy="1326" rx="8" ry="4" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <path d="M198 1326 v6 a8 4 0 0 0 16 0 v-6" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <text x="222" y="1330" font-size="13" fill="#166534">scan_history</text>

  <!-- Analytics store group -->
  <rect x="460" y="1196" width="280" height="78" rx="12" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="600" y="1218" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">MongoDB collections</text>
  <g filter="url(#shadow)"><rect x="480" y="1230" width="240" height="32" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.2"/></g>
  <ellipse cx="496" cy="1246" rx="8" ry="4" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <path d="M488 1246 v6 a8 4 0 0 0 16 0 v-6" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <text x="512" y="1250" font-size="13" fill="#166534">analytics_hourly</text>

  <!-- Audit store group -->
  <rect x="750" y="1196" width="280" height="78" rx="12" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="890" y="1218" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">MongoDB collections</text>
  <g filter="url(#shadow)"><rect x="770" y="1230" width="240" height="32" rx="6" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.2"/></g>
  <ellipse cx="786" cy="1246" rx="8" ry="4" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <path d="M778 1246 v6 a8 4 0 0 0 16 0 v-6" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <text x="802" y="1250" font-size="13" fill="#166534">audit_logs</text>

  <!-- Arrows to shared metrics store -->
  <line x1="310" y1="1360" x2="560" y2="1428" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="600" y1="1274" x2="600" y2="1428" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="890" y1="1274" x2="640" y2="1428" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Shared metrics store -->
  <g filter="url(#shadow)">
    <rect x="500" y="1428" width="200" height="60" rx="8" fill="#FEF3C7" stroke="#B45309" stroke-width="1.5"/>
  </g>
  <ellipse cx="522" cy="1450" rx="9" ry="4.5" fill="none" stroke="#B45309" stroke-width="1.5"/>
  <path d="M513 1450 v10 a9 4.5 0 0 0 18 0 v-10" fill="none" stroke="#B45309" stroke-width="1.5"/>
  <text x="600" y="1454" text-anchor="middle" font-size="14" font-weight="600" fill="#92400E">metrics</text>
  <text x="600" y="1472" text-anchor="middle" font-size="11" fill="#B45309">shared across consumers</text>

  <!-- Legend -->
  <g transform="translate(60, 1520)">
    <rect x="0" y="-14" width="14" height="14" rx="3" fill="#EFF6FF" stroke="#93C5FD"/>
    <text x="20" y="-3" font-size="12" fill="#334155">Client / gateway</text>
    <rect x="160" y="-14" width="14" height="14" rx="3" fill="#FFF7ED" stroke="#C2410C" stroke-dasharray="3 2"/>
    <text x="180" y="-3" font-size="12" fill="#334155">Kafka topic</text>
    <rect x="290" y="-14" width="14" height="14" rx="3" fill="#CCFBF1" stroke="#0F766E"/>
    <text x="310" y="-3" font-size="12" fill="#334155">Consumer</text>
    <rect x="420" y="-14" width="14" height="14" rx="3" fill="#F0FDF4" stroke="#16A34A" stroke-dasharray="3 2"/>
    <text x="440" y="-3" font-size="12" fill="#334155">MongoDB collection</text>
    <line x1="610" y1="-7" x2="640" y2="-7" stroke="#C2410C" stroke-width="1.6" stroke-dasharray="4 3"/>
    <text x="650" y="-3" font-size="12" fill="#334155">Async response path</text>
  </g>
</svg>
